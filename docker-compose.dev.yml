# Development dependencies (PostgreSQL). The app itself runs via `npm run dev`.
services:
  postgres:
    image: postgres:17-alpine
    container_name: amber-postgres-dev
    environment:
      POSTGRES_USER: amber
      POSTGRES_PASSWORD: amber
      POSTGRES_DB: amber
    ports:
      - "5432:5432"
    volumes:
      - amber-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amber"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  amber-pgdata:
